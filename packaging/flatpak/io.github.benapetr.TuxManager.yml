app-id: io.github.benapetr.TuxManager
runtime: org.kde.Platform
runtime-version: '6.7'
sdk: org.kde.Sdk
command: tux-manager
finish-args:
  - --share=network
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --filesystem=host:ro
  - --filesystem=/run:ro
  - --talk-name=org.freedesktop.systemd1
cleanup:
  - '/include'
  - '/lib/pkgconfig'
  - '/share/man'
modules:
  - name: tux-manager
    buildsystem: simple
    build-commands:
      - mkdir -p build
      - qmake6 src/TuxManager.pro -o build/Makefile
      - make -C build -j${FLATPAK_BUILDER_N_JOBS}
      - install -Dm755 build/tux-manager /app/bin/tux-manager
      - install -Dm644 packaging/flatpak/io.github.benapetr.TuxManager.desktop /app/share/applications/io.github.benapetr.TuxManager.desktop
      - install -Dm644 packaging/flatpak/io.github.benapetr.TuxManager.metainfo.xml /app/share/metainfo/io.github.benapetr.TuxManager.metainfo.xml
      - install -Dm644 packaging/flatpak/io.github.benapetr.TuxManager.svg /app/share/icons/hicolor/scalable/apps/io.github.benapetr.TuxManager.svg
    sources:
      - type: dir
        path: ../../
